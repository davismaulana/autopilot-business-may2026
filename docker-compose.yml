services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.autopilot-may2026.rule=Host(`autopilot-may2026.zenova.id`)"
      - "traefik.http.routers.autopilot-may2026.entrypoints=websecure"
      - "traefik.http.services.autopilot-may2026-service.loadbalancer.server.port=80"
      - "traefik.http.routers.autopilot-may2026.service=autopilot-may2026-service"
      - "traefik.http.routers.autopilot-may2026.tls=true"

networks:
  dokploy-network:
    external: true
